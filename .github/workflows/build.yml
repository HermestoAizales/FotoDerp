name: Build FotoDerp

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (leave empty for all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - linux
          - macos-dmg
          - macos-zip
          - windows

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  backend-check:
    name: Backend Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt nuitka
      - name: Compile check
        run: find backend -name "*.py" -not -path "*/__pycache__/*" | xargs python3 -m py_compile

  build-windows:
    name: Build Windows NSIS
    runs-on: windows-2025
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.platform == '' ||
      github.event.inputs.platform == 'windows'
    needs: backend-check
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Set GitHub token
        run: echo "GH_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install npm packages
        run: npm ci || npm install
      - name: Build backend with Nuitka
        shell: pwsh
        run: |
          cd backend
          pip install nuitka
          # Download depends.exe directly to the location Nuitka expects
          $nuitkaDir = "$env:USERPROFILE\.nuitka"
          New-Item -ItemType Directory -Force -Path $nuitkaDir | Out-Null
          
          # Try to download from multiple sources
          if (-not (Test-Path "$nuitkaDir\depends.exe")) {
            # Try WinDepends first
            $url = "https://github.com/hfiref0x/WinDepends/releases/download/170724/WinDepends.zip"
            $zipPath = "$nuitkaDir\windepends.zip"
            Invoke-WebRequest -Uri $url -OutFile $zipPath -ErrorAction SilentlyContinue
            if (Test-Path $zipPath) {
              Expand-Archive -Path $zipPath -DestinationPath $nuitkaDir -Force
              $exe = Get-ChildItem -Path $nuitkaDir -Recurse -Filter "*depends*.exe" | Select-Object -First 1
              if ($exe) {
                Copy-Item $exe.FullName "$nuitkaDir\depends.exe" -Force
              }
            }
            
            # Fallback to dependencywalker.com if needed
            if (-not (Test-Path "$nuitkaDir\depends.exe")) {
              $url2 = "https://web.archive.org/web/2023/https://dependencywalker.com/depends22_x64.zip"
              $zipPath2 = "$nuitkaDir\depends22_x64.zip"
              Invoke-WebRequest -Uri $url2 -OutFile $zipPath2 -ErrorAction SilentlyContinue
              if (Test-Path $zipPath2) {
                Expand-Archive -Path $zipPath2 -DestinationPath $nuitkaDir -Force
                $exe2 = Get-ChildItem -Path $nuitkaDir -Recurse -Filter "depends.exe" | Select-Object -First 1
                if ($exe2) {
                  Copy-Item $exe2.FullName "$nuitkaDir\depends.exe" -Force
                }
              }
            }
          }
          
          # Verify depends.exe exists
          if (Test-Path "$nuitkaDir\depends.exe") {
            Write-Host "depends.exe found at $nuitkaDir\depends.exe"
          } else {
            Write-Host "WARNING: depends.exe not found, Nuitka will try to download it automatically"
          }
          
          # Build with Nuitka
          python -m nuitka --onefile --assume-yes-for-downloads --nofollow-import-to=tkinter --nofollow-import-to=pytest fotoerp_backend/main.py
      - name: Temporarily move icons dir
        shell: pwsh
        run: Remove-Item icons -Force -Recurse -ErrorAction SilentlyContinue
      - name: Build Electron
        shell: bash
        run: npm run build:win
      - name: Restore icons dir
        shell: pwsh
        run: git checkout -- icons/ 2>$null; if (-not (Test-Path icons)) { git restore icons/ }
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fotoerp-windows-nsis
          path: dist/FotoDerp Setup *.exe
          retention-days: 14
