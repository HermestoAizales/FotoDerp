name: Build FotoDerp

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (leave empty for all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - linux
          - macos-dmg
          - macos-zip
          - windows

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  backend-check:
    name: Backend Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt nuitka
      - name: Compile check
        run: find backend -name "*.py" -not -path "*/__pycache__/*" | xargs python3 -m py_compile

  build-windows:
    name: Build Windows NSIS
    runs-on: windows-2025
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.platform == '' ||
      github.event.inputs.platform == 'windows'
    needs: backend-check
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Set GitHub token
        run: echo "GH_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install npm packages
        run: npm ci || npm install
      
      - name: Install Nuitka globaly
        shell: pwsh
        run: python3 -m pip install nuitka
      
      - name: Download Dependency Walker for Nuitka
        shell: pwsh
        run: |
          $nuitkaDir = "$env:USERPROFILE\.nuitka"
          New-Item -ItemType Directory -Force -Path $nuitkaDir | Out-Null
          
          if (-not (Test-Path "$nuitkaDir\depends.exe")) {
            Write-Host "Downloading Dependency Walker..."
            $url = "https://dependencywalker.com/depends22_x64.zip"
            $zipPath = "$nuitkaDir\deps.zip"
            try {
              Invoke-WebRequest -Uri $url -OutFile $zipPath -ErrorAction Stop
              Expand-Archive -Path $zipPath -DestinationPath $nuitkaDir -Force
              $exe = Get-ChildItem -Path $nuitkaDir -Recurse -Filter "depends.exe" | Select-Object -First 1
              if ($exe) {
                Copy-Item $exe.FullName "$nuitkaDir\depends.exe" -Force
                Write-Host "Dependency Walker downloaded to $nuitkaDir\depends.exe"
              }
            } catch {
              Write-Host "WARNING: Could not download Dependency Walker: $_"
              Write-Host "Nuitka will try to download it automatically"
            }
          } else {
            Write-Host "depends.exe already exists"
          }
      
      - name: Build Electron (includes backend build)
        shell: pwsh
        run: |
          npm run build:win
      
      - name: Temporarily move icons dir
        shell: pwsh
        run: Remove-Item icons -Force -Recurse -ErrorAction SilentlyContinue
      
      - name: Restore icons dir
        shell: pwsh
        run: git checkout -- icons/ 2>$null; if (-not (Test-Path icons)) { git restore icons/ }
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fotoerp-windows-nsis
          path: dist/FotoDerp Setup *.exe
          retention-days: 14
