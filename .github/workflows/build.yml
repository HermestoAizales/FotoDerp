name: Build FotoDerp

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  backend-check:
    name: Backend Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile check
        run: find backend -name "*.py" -not -path "*/__pycache__/*" | xargs python3 -m py_compile

  build-app:
    name: Build ${{ matrix.name }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: backend-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux AppImage
            os: ubuntu-24.04
            platform: linux
            artifact_name: fotoerp-linux-appimage
            artifact_path: dist/FotoDerp*.AppImage
          - name: macOS dmg
            os: macos-14
            platform: mac
            artifact_name: fotoerp-macos-dmg
            artifact_path: dist/FotoDerp*.dmg
          - name: macOS zip
            os: macos-14
            platform: mac
            artifact_name: fotoerp-macos-zip
            artifact_path: dist/FotoDerp*.zip
          - name: Windows NSIS
            os: windows-2025
            platform: win
            artifact_name: fotoerp-windows-nsis
            artifact_path: dist/FotoDerp Setup *.exe

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install npm packages
        run: npm ci || npm install
      - name: Install Nuitka
        run: pip install nuitka
      - name: Download Dependency Walker (Windows only)
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          $dir = "$env:USERPROFILE\.nuitka"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Invoke-WebRequest -Uri "https://www.dependencywalker.com/depends22_portable.zip" -OutFile "$dir\depends.zip"
          Expand-Archive -Path "$dir\depends.zip" -DestinationPath $dir -Force
          Remove-Item "$dir\depends.zip"
      - name: Build backend
        shell: bash
        run: cd backend && python3 build_backend.py --target ${{ matrix.platform }}
      - name: Build Electron
        shell: bash
        run: npm run build:${{ matrix.platform }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 14

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-app]
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 10

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/fotoerp-linux-appimage/*
            artifacts/fotoerp-macos-dmg/*
            artifacts/fotoerp-macos-zip/*
            artifacts/fotoerp-windows-nsis/*
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: false
