# FotoDerp CI/CD - Cross-Platform Build Pipeline
#
# Builds the full FotoDerp app for Linux, macOS, and Windows.
# Triggers on push to main/develop and on tags (v*).
#
# Artifacts uploaded per platform:
#   - Linux:  dist/FotoDerp-*.AppImage
#   - macOS:  dist/FotoDerp-*.dmg + dist/FotoDerp-*.zip
#   - Windows: dist/FotoDerp Setup *.exe

name: Build FotoDerp

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

# Cancel in-progress runs for same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

# ============================================================
# JOB 1: Backend lint + test (Linux)
# ============================================================
jobs:
  backend-check:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff (optional)
        run: |
          pip install ruff
          cd backend && ruff check fotoerp_backend/ || echo "ruff not required"

      - name: Verify all Python files compile
        run: |
          find backend -name "*.py" -not -path "*/__pycache__/*" | \
            xargs python3 -m py_compile

  # ============================================================
  # JOB 2: Build Electron app per platform
  # ============================================================
  build-app:
    name: Build ${{ matrix.name }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: backend-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux AppImage
            os: ubuntu-24.04
            platform: linux
            target: AppImage
            artifact_name: fotoerp-linux-appimage
            artifact_path: dist/FotoDerp*.AppImage

          - name: macOS dmg
            os: macos-14
            platform: mac
            target: dmg
            artifact_name: fotoerp-macos-dmg
            artifact_path: dist/FotoDerp*.dmg

          - name: macOS zip
            os: macos-14
            platform: mac
            target: zip
            artifact_name: fotoerp-macos-zip
            artifact_path: dist/FotoDerp*.zip

          - name: Windows NSIS
            os: windows-2025
            platform: win
            target: nsis
            artifact_name: fotoerp-windows-nsis
            artifact_path: dist/FotoDerp Setup *.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install npm packages
        run: npm ci || npm install

      - name: Install Nuitka
        run: pip install nuitka

      - name: Build backend for ${{ matrix.platform }}
        shell: bash
        run: |
          cd backend
          python3 build_backend.py --target ${{ matrix.platform }}

      - name: Build Electron app (${{ matrix.target }})
        shell: bash
        run: |
          npm run build:${{ matrix.platform }}

      - name: Upload ${{ matrix.name }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 14

      - name: Notarize macOS dmg (if secrets available)
        if: ${{ matrix.platform == 'mac' && secrets.APPLE_ID != '' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool store-credentials "notary" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID"
          xcrun notarytool submit dist/FotoDerp*.dmg \
            --wait \
            --bundle-id "com.fotoerp.app"

  # ============================================================
  # JOB 3: Create GitHub Release (on tag only)
  # ============================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-app]
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 10

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/fotoerp-linux-appimage/*
            artifacts/fotoerp-macos-dmg/*
            artifacts/fotoerp-macos-zip/*
            artifacts/fotoerp-windows-nsis/*
          draft: true
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}
          generate_release_notes: true
          fail_on_unmatched_files: false
