name: Build FotoDerp

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (leave empty for all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - linux
          - macos-dmg
          - macos-zip
          - windows

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  backend-check:
    name: Backend Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile check
        run: find backend -name "*.py" -not -path "*/__pycache__/*" | xargs python3 -m py_compile

  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-24.04
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.platform == '' ||
      github.event.inputs.platform == 'linux'
    needs: backend-check
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set GitHub token
        run: echo "GH_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install npm packages
        run: npm ci || npm install
      - name: Install Nuitka
        run: pip install nuitka
      - name: Build backend
        shell: bash
        run: cd backend && python3 build_backend.py --target linux
      - name: Temporarily move icons dir
        run: mv icons icons.bak || true
      - name: Build Electron
        shell: bash
        run: npm run build:linux
      - name: Restore icons dir
        run: mv icons.bak icons || true
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fotoerp-linux-appimage
          path: dist/FotoDerp*.AppImage
          retention-days: 14

  build-macos-dmg:
    name: Build macOS DMG
    runs-on: macos-14
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.platform == '' ||
      github.event.inputs.platform == 'macos-dmg'
    needs: backend-check
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set GitHub token
        run: echo "GH_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install npm packages
        run: npm ci || npm install
      - name: Install Nuitka
        run: pip install nuitka
      - name: Build backend
        shell: bash
        run: cd backend && python3 build_backend.py --target mac
      - name: Temporarily move icons dir
        run: mv icons icons.bak || true
      - name: Build Electron (DMG)
        shell: bash
        run: npm run build:mac -- --dir dmg
      - name: Restore icons dir
        run: mv icons.bak icons || true
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fotoerp-macos-dmg
          path: dist/FotoDerp*.dmg
          retention-days: 14

  build-macos-zip:
    name: Build macOS ZIP
    runs-on: macos-14
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.platform == '' ||
      github.event.inputs.platform == 'macos-zip'
    needs: backend-check
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set GitHub token
        run: echo "GH_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install npm packages
        run: npm ci || npm install
      - name: Install Nuitka
        run: pip install nuitka
      - name: Build backend
        shell: bash
        run: cd backend && python3 build_backend.py --target mac
      - name: Temporarily move icons dir
        run: mv icons icons.bak || true
      - name: Build Electron (ZIP)
        shell: bash
        run: npm run build:mac -- --dir zip
      - name: Restore icons dir
        run: mv icons.bak icons || true
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fotoerp-macos-zip
          path: dist/FotoDerp*.zip
          retention-days: 14

  build-windows:
    name: Build Windows NSIS
    runs-on: windows-2025
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.platform == '' ||
      github.event.inputs.platform == 'windows'
    needs: backend-check
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set GitHub token
        run: echo "GH_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install npm packages
        run: npm ci || npm install
      - name: Install Nuitka
        run: pip install nuitka
      - name: Download Dependencies (Windows only)
        shell: pwsh
        run: |
          $dir = "$env:USERPROFILE\.nuitka"
          New-Item -ItemType Directory -Force -Path $dir | OutNull
          $url = "https://github.com/lucasg/Dependencies/releases/download/v1.11.1/Dependencies_x64_Release.zip"
          try {
            Invoke-WebRequest -Uri $url -OutFile "$dir\deps.zip" -ErrorAction Stop
            Expand-Archive -Path "$dir\deps.zip" -DestinationPath $dir -Force -ErrorAction SilentlyContinue
            $exe = Get-ChildItem -Path $dir -Recurse -Filter "Dependencies.exe" | Select-Object -First 1
            if ($exe) {
              $dest = "$dir\Dependencies.exe"
              if ($exe.FullName -ne $dest) {
                Copy-Item $exe.FullName $dest -Force
              }
              Write-Host "Dependencies.exe found at $($exe.FullName)"
            } else {
              Write-Error "Could not find Dependencies.exe in archive"
              exit 1
            }
          } catch {
            Write-Error "Failed to download Dependencies: $_"
            exit 1
          }
      - name: Build backend
        shell: bash
        run: cd backend && python3 build_backend.py --target win
      - name: Temporarily move icons dir
        run: mv icons icons.bak || true
      - name: Build Electron
        shell: bash
        run: npm run build:win
      - name: Restore icons dir
        run: mv icons.bak icons || true
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fotoerp-windows-nsis
          path: dist/FotoDerp Setup *.exe
          retention-days: 14
