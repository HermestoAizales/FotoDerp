name: FotoDerp CI Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  python-check:
    name: Python Compilation Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Verify all Python files compile
        run: find backend -name "*.py" -not -path "*/__pycache__/*" | xargs python3 -m py_compile

  npm-check:
    name: npm Install Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Generate package-lock.json
        run: npm install --package-lock-only
      - name: Verify npm ci works
        run: npm ci

  lint-python:
    name: Python Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff (warnings only, non-blocking)
        run: |
          cd backend
          pip install -q ruff
          ruff check fotoerp_backend/ --output-format=github || true
