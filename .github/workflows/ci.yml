# FotoDerp CI — Quick checks on PRs and pushes
# Runs linting, Python compilation check, and npm install verification.
# Full builds happen in .github/workflows/build.yml

name: FotoDerp CI Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # --- Python: verify all files compile ---
  python-check:
    name: Python Compilation Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify all Python files compile
        run: |
          find backend -name "*.py" -not -path "*/__pycache__/*" | \
            xargs python3 -m py_compile

  # --- npm: verify install works ---
  npm-check:
    name: npm Install Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Verify npm install
        run: |
          npm ci --ignore-scripts || npm install --ignore-scripts
          echo "node_modules installed successfully"

  # --- Lint: ruff for Python ---
  lint-python:
    name: Python Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check backend/fotoerp_backend/
